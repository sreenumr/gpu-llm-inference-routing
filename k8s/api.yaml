apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: install-deps
        image: python:3.12-slim
        command: ["pip", "install", "--target=/deps", "-r", "/code/requirements.txt"]
        volumeMounts:
        - name: code
          mountPath: /code
        - name: deps
          mountPath: /deps
      containers:
      - name: backend
        image: python:3.12-slim
        command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
        env:
        - name: PYTHONPATH
          value: "/deps"
        workingDir: /code
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: code
          mountPath: /code
        - name: deps
          mountPath: /deps
      volumes:
      - name: code
        configMap:
          name: backend-code
      - name: deps
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: default
spec:
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
